<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DelayedNotifier</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #f5f5f5;
            color: #333;
        }

        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #555; }
        p.sub { color: #888; font-size: 0.85rem; margin-bottom: 2rem; }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        textarea { resize: vertical; min-height: 60px; }

        .row { display: flex; gap: 1rem; }
        .row > div { flex: 1; }

        button {
            padding: 0.5rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-create { background: #4f46e5; color: #fff; }
        .btn-create:hover { background: #4338ca; }
        .btn-refresh { background: #e5e7eb; color: #333; }
        .btn-cancel {
            background: none;
            border: 1px solid #e5e7eb;
            color: #ef4444;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
        }
        .btn-cancel:hover { border-color: #ef4444; }

        .notify-item {
            border-bottom: 1px solid #eee;
            padding: 0.75rem 0;
            display: flex;
            justify-content: space-between;
            align-items: start;
        }
        .notify-item:last-child { border-bottom: none; }
        .notify-msg { font-weight: 600; margin-bottom: 0.25rem; }
        .notify-meta { font-size: 0.75rem; color: #888; }

        .badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            text-transform: uppercase;
        }
        .badge-scheduled { background: #ede9fe; color: #7c3aed; }
        .badge-sent { background: #d1fae5; color: #059669; }
        .badge-failed { background: #fee2e2; color: #dc2626; }
        .badge-canceled { background: #fef3c7; color: #d97706; }

        .empty { text-align: center; color: #aaa; padding: 2rem; }

        .search-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .search-row input { margin-bottom: 0; }
        .search-row button { background: #e5e7eb; white-space: nowrap; }

        .right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.4rem;
        }
    </style>
</head>
<body>

<h1>DelayedNotifier</h1>
<p class="sub">Сервис отложенных уведомлений</p>

<div class="card">
    <h2>Новое уведомление</h2>
    <form id="form">
        <label>Сообщение</label>
        <textarea id="message" placeholder="Текст уведомления" required></textarea>

        <div class="row">
            <div>
                <label>Канал</label>
                <select id="channel">
                    <option value="log">Log (тест)</option>
                    <option value="telegram">Telegram</option>
                </select>
            </div>
            <div>
                <label>Получатель</label>
                <input type="text" id="recipient" placeholder="chat_id">
            </div>
        </div>

        <div class="row">
            <div>
                <label>Задержка (сек)</label>
                <input type="number" id="delay" value="10" min="0">
            </div>
            <div>
                <label>Или точное время</label>
                <input type="text" id="scheduled" placeholder="2026-12-31T23:59:00Z">
            </div>
        </div>

        <button type="submit" class="btn-create">Создать</button>
    </form>
</div>

<div class="search-row">
    <input type="text" id="searchId" placeholder="ID уведомления...">
    <button onclick="search()">Найти</button>
</div>

<div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem;">
        <h2 style="margin:0">Уведомления</h2>
        <button class="btn-refresh" onclick="refresh()">Обновить</button>
    </div>
    <div id="list"><div class="empty">Пока пусто</div></div>
</div>

<script>
    let items = [];

    document.getElementById('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
            message: document.getElementById('message').value.trim(),
            channel: document.getElementById('channel').value,
            recipient: document.getElementById('recipient').value.trim() || 'test-user',
            delay_sec: parseInt(document.getElementById('delay').value) || 0,
        };
        const s = document.getElementById('scheduled').value.trim();
        if (s) { body.scheduled_at = s; delete body.delay_sec; }

        try {
            const r = await fetch('/notify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
            if (!r.ok) throw new Error((await r.json()).error);
            items.unshift(await r.json());
            render();
            document.getElementById('form').reset();
            document.getElementById('delay').value = '10';
        } catch (e) { alert('Ошибка: ' + e.message); }
    });

    async function search() {
        const id = document.getElementById('searchId').value.trim();
        if (!id) return;
        try {
            const r = await fetch('/notify/' + id);
            if (!r.ok) throw new Error((await r.json()).error);
            const d = await r.json();
            const i = items.findIndex(n => n.id === d.id);
            if (i >= 0) items[i] = d; else items.unshift(d);
            render();
        } catch (e) { alert('Ошибка: ' + e.message); }
    }

    async function cancel(id) {
        try {
            const r = await fetch('/notify/' + id, {method: 'DELETE'});
            if (!r.ok) throw new Error((await r.json()).error);
            const d = await r.json();
            const i = items.findIndex(n => n.id === id);
            if (i >= 0) items[i] = d;
            render();
        } catch (e) { alert('Ошибка: ' + e.message); }
    }

    async function refresh() {
        for (let i = 0; i < items.length; i++) {
            try {
                const r = await fetch('/notify/' + items[i].id);
                if (r.ok) items[i] = await r.json();
            } catch {}
        }
        render();
    }

    function render() {
        const el = document.getElementById('list');
        if (!items.length) { el.innerHTML = '<div class="empty">Пока пусто</div>'; return; }
        el.innerHTML = items.map(n => `
            <div class="notify-item">
                <div>
                    <div class="notify-msg">${esc(n.message)}</div>
                    <div class="notify-meta">
                        ${n.id.slice(0,8)}... · ${n.channel || 'log'} · ${esc(n.recipient || '-')} · ${fmt(n.scheduled_at)}
                        ${n.retry_count > 0 ? ' · попытки: ' + n.retry_count + '/' + n.max_retries : ''}
                    </div>
                </div>
                <div class="right">
                    <span class="badge badge-${n.status}">${n.status}</span>
                    ${n.status === 'scheduled' ? `<button class="btn-cancel" onclick="cancel('${n.id}')">Отменить</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function fmt(s) {
        if (!s) return '-';
        return new Date(s).toLocaleString('ru-RU');
    }

    function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
</script>

</body>
</html>
